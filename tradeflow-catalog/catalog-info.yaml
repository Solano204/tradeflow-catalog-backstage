apiVersion: backstage.io/v1alpha1
kind: Location
metadata:
  name: tradeflow-root
  description: TradeFlow microservices catalog root
spec:
  targets:
    - ./catalog/system.yaml
    - ./catalog/resources.yaml
    - ./catalog/api.yaml

---
# AUTH SERVICE
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: auth-service
  title: Auth Service
  description: JWT issuance (RS256), refresh token rotation, JWKS endpoint, Okta SSO, MFA (TOTP). Built with Quarkus 3.6.4.
  tags:
    - java
    - quarkus
    - oauth2
    - jwt
    - oidc
  annotations:
    github.com/project-slug: Solano204/tradeflow-catalog
    backstage.io/techdocs-ref: dir:.
  links:
    - url: http://localhost:8080/swagger-ui
      title: Swagger UI
      icon: web
    - url: http://localhost:8080/.well-known/jwks.json
      title: JWKS Endpoint
      icon: api
    - url: http://localhost:9411/zipkin/?serviceName=tradeflow-auth-service
      title: Traces (Zipkin)
      icon: dashboard
spec:
  type: service
  lifecycle: production
  owner: auth-team
  system: tradeflow
  providesApis:
    - auth-api
    - jwks-api
  dependsOn:
    - resource:auth-postgres
    - resource:auth-redis
    - resource:kafka

---
# IDENTITY SERVICE
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: identity-service
  title: Identity Service
  description: Buyer registration, KYC merchant onboarding, admin management. CQRS with PostgreSQL + MongoDB. Virtual Threads.
  tags:
    - java
    - spring-boot
    - cqrs
    - kyc
    - mongodb
  annotations:
    github.com/project-slug: Solano204/tradeflow-catalog
    backstage.io/techdocs-ref: dir:.
