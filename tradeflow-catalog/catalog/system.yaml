apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: tradeflow
  title: TradeFlow Platform
  description: |
    Distributed e-commerce marketplace. 8 microservices coordinated via
    Kafka SAGA pattern. Mixed Quarkus (Auth, Payment) and Spring Boot stack.
    Full distributed tracing via Zipkin. PostgreSQL + MongoDB + Redis + Elasticsearch.
  tags:
    - microservices
    - kafka
    - spring-boot
    - quarkus
    - e-commerce
spec:
  owner: platform-team
  domain: tradeflow

---
apiVersion: backstage.io/v1alpha1
kind: Group
metadata:
  name: platform-team
  description: TradeFlow platform infrastructure team
spec:
  type: team
  children: []

