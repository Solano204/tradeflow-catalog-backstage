apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: auth-api
  title: Authentication API
  description: JWT issuance, refresh token rotation, device revocation, token introspection
  links:
    - url: http://localhost:8080/swagger-ui
      title: Swagger UI
spec:
  type: openapi
  lifecycle: production
  owner: auth-team
  system: tradeflow
  definition: |
    openapi: "3.0.0"
    info:
      title: TradeFlow Auth API
      version: "1.0.0"
    paths:
      /auth/login:
        post:
          summary: Login and issue JWT tokens
      /auth/refresh:
        post:
          summary: Rotate refresh token
      /auth/logout:
        post:
          summary: Revoke refresh token
      /.well-known/jwks.json:
        get:
          summary: JWKS public key endpoint

---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: order-api
  title: Order API
  description: SAGA-orchestrated order lifecycle — create, track, cancel, ship, deliver, return
  links:
    - url: http://localhost:8084/swagger-ui.html
      title: Swagger UI
spec:
  type: openapi
  lifecycle: production
  owner: order-team
  system: tradeflow
  definition: |
    openapi: "3.0.0"
    info:
      title: TradeFlow Order API
      version: "1.0.0"
    paths:
      /orders:
        post:
          summary: Create order and begin SAGA
      /orders/{orderId}:
        get:
          summary: Get order with SAGA timeline
      /orders/{orderId}/cancel:
        post:
          summary: Cancel order

