apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: inventory-api
  title: Inventory API
  description: Two-phase reserve/confirm/release stock management
spec:
  type: openapi
  lifecycle: production
  owner: inventory-team
  system: tradeflow
  definition: |
    openapi: "3.0.0"
    info:
      title: TradeFlow Inventory API
      version: "1.0.0"
    paths:
      /inventory/{productId}/reserve:
        post:
          summary: Phase 1 — reserve stock
      /inventory/{productId}/confirm:
        post:
          summary: Phase 2a — confirm after payment
      /inventory/{productId}/release:
        post:
          summary: Phase 2b — compensation path

