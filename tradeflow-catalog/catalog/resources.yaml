# ── KAFKA (shared by all 8 services) ──────────────────────────────────────
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: kafka
  title: Apache Kafka
  description: |
    23 topics: auth-events, identity.buyer-events, identity.merchant-events,
    catalog.product-events, inventory.events, order.events, notifications,
    cmd.reserve-inventory, cmd.confirm-inventory, cmd.release-inventory,
    cmd.score-transaction, cmd.charge-payment, payment.events,
    fraud.events, fraud.alerts, fraud.confirmed, dispute.events ...
  links:
    - url: http://localhost:8095
      title: Kafka UI
      icon: dashboard
spec:
  type: message-queue
  owner: platform-team
  system: tradeflow
  lifecycle: production

