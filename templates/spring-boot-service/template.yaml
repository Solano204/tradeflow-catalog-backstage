apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: spring-boot-microservice
  title: TradeFlow Spring Boot Microservice
  description: Spring Boot 3.2 + Java 21 + Kafka + PostgreSQL + Redis + JWT + Zipkin
  tags:
    - java
    - spring-boot
    - kafka
    - postgresql
    - tradeflow
spec:
  owner: group:default/tradeflow-team
  type: service

  parameters:
    - title: Service Information
      required:
        - serviceName
        - description
        - port
      properties:
        serviceName:
          title: Service Name
          type: string
          description: e.g. notification-service
          pattern: '^[a-z][a-z0-9-]*-service$'
          ui:autofocus: true
        description:
          title: Description
          type: string
        port:
          title: HTTP Port
          type: integer
          default: 8090

    - title: Features
      properties:
        includeKafka:
          title: Include Kafka (producer + consumer)
          type: boolean
          default: true
        includeRedis:
          title: Include Redis
          type: boolean
          default: true
        includePostgres:
          title: Include PostgreSQL + Flyway
          type: boolean
          default: true
        includeMongoDB:
          title: Include MongoDB
          type: boolean
          default: false
        includeSecurity:
          title: Include JWT Security
          type: boolean
          default: true
        includeResilience4j:
          title: Include Resilience4j
          type: boolean
          default: true

    - title: Repository
      required:
        - repoUrl
      properties:
        repoUrl:
          title: GitHub Repository
          type: string
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts:
              - github.com

  steps:
    - id: fetch
      name: Generate Files
      action: fetch:template
      input:
        url: ./skeleton
        values:
          serviceName: ${{ parameters.serviceName }}
          description: ${{ parameters.description }}
          port: ${{ parameters.port }}
          includeKafka: ${{ parameters.includeKafka }}
          includeRedis: ${{ parameters.includeRedis }}
          includePostgres: ${{ parameters.includePostgres }}
          includeMongoDB: ${{ parameters.includeMongoDB }}
          includeSecurity: ${{ parameters.includeSecurity }}
          includeResilience4j: ${{ parameters.includeResilience4j }}

    - id: publish
      name: Publish to GitHub
      action: publish:github
      input:
        description: ${{ parameters.description }}
        repoUrl: ${{ parameters.repoUrl }}
        defaultBranch: main

    - id: register
      name: Register in Catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps.publish.output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml

  output:
    links:
      - title: Repository
        url: ${{ steps.publish.output.remoteUrl }}
      - title: Open in Catalog
        icon: catalog
        entityRef: ${{ steps.register.output.entityRef }}