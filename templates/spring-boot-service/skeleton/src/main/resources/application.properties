spring.application.name=${{ values.serviceName }}
server.port=${{ values.port }}

# Virtual Threads (Java 21)
spring.threads.virtual.enabled=true

{%- if values.includePostgres %}
# ── PostgreSQL ──────────────────────────────────────────────────────────────
spring.datasource.url=${POSTGRES_URL:jdbc:postgresql://localhost:5432/${{ values.serviceName | replace('-', '_') }}_db}
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:secret}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=3000

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JDBC tracing
jdbc.datasource-proxy.slow-query.enable-logging=true
jdbc.datasource-proxy.slow-query.threshold=300
jdbc.datasource-proxy.query.enable-logging=false
{%- endif %}

{%- if values.includeKafka %}
# ── Kafka ───────────────────────────────────────────────────────────────────
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false
{%- endif %}

{%- if values.includeRedis %}
# ── Redis ───────────────────────────────────────────────────────────────────
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=20
spring.data.redis.lettuce.pool.min-idle=5
{%- endif %}

{%- if values.includeMongoDB %}
# ── MongoDB ─────────────────────────────────────────────────────────────────
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/${{ values.serviceName | replace('-', '_') }}_db}
spring.data.mongodb.database=${{ values.serviceName | replace('-', '_') }}_db
{%- endif %}

{%- if values.includeSecurity %}
# ── Security / JWT ──────────────────────────────────────────────────────────
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${AUTH_SERVICE_JWKS_URI:http://localhost:8080/.well-known/jwks.json}
{%- endif %}

# ── Distributed Tracing ─────────────────────────────────────────────────────
management.zipkin.tracing.endpoint=${ZIPKIN_URL:http://localhost:9411}/api/v2/spans
management.tracing.sampling.probability=1.0
management.tracing.propagation.type=W3C

# ── Actuator ────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# ── SpringDoc ───────────────────────────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ── Logging ─────────────────────────────────────────────────────────────────
logging.level.io.tradeflow=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.kafka=WARN
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] [traceId=%X{traceId}] %-5level %logger{36} - %msg%n
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]