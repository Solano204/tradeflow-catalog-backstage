quarkus.application.name=${{ values.serviceName }}
quarkus.http.port=${{ values.port }}

# Dev Services — disable auto-containers
quarkus.datasource.devservices.enabled=false
quarkus.mongodb.devservices.enabled=false
quarkus.kafka.devservices.enabled=false
quarkus.redis.devservices.enabled=false

{%- if values.includePostgres %}
# ── PostgreSQL Reactive ─────────────────────────────────────────────────────
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${POSTGRES_USER:postgres}
quarkus.datasource.password=${POSTGRES_PASSWORD:secret}
quarkus.datasource.reactive.url=${POSTGRES_REACTIVE_URL:postgresql://localhost:5432/${{ values.serviceName | replace('-', '_') }}_db}
quarkus.datasource.reactive.max-size=20
quarkus.datasource.jdbc.url=${POSTGRES_JDBC_URL:jdbc:postgresql://localhost:5432/${{ values.serviceName | replace('-', '_') }}_db}
quarkus.datasource.jdbc.max-size=5
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=false
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration
{%- endif %}

{%- if values.includeMongoDB %}
# ── MongoDB ─────────────────────────────────────────────────────────────────
quarkus.mongodb.connection-string=${MONGO_URL:mongodb://localhost:27017/${{ values.serviceName | replace('-', '_') }}_db}
quarkus.mongodb.database=${{ values.serviceName | replace('-', '_') }}_db
{%- endif %}

{%- if values.includeRedis %}
# ── Redis ───────────────────────────────────────────────────────────────────
quarkus.redis.hosts=${REDIS_URL:redis://localhost:6379}
{%- endif %}

{%- if values.includeKafka %}
# ── Kafka ───────────────────────────────────────────────────────────────────
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# Consumer example — rename as needed
mp.messaging.incoming.your-topic-in.connector=smallrye-kafka
mp.messaging.incoming.your-topic-in.topic=your.topic
mp.messaging.incoming.your-topic-in.group.id=${{ values.serviceName }}-group
mp.messaging.incoming.your-topic-in.auto.offset.reset=earliest
mp.messaging.incoming.your-topic-in.enable.auto.commit=false

# Producer example — rename as needed
mp.messaging.outgoing.your-events-out.connector=smallrye-kafka
mp.messaging.outgoing.your-events-out.topic=your.events
mp.messaging.outgoing.your-events-out.acks=all
{%- endif %}

{%- if values.includeSecurity %}
# ── Security ────────────────────────────────────────────────────────────────
mp.jwt.verify.publickey.location=${JWT_JWKS_URL:http://localhost:8080/.well-known/jwks.json}
mp.jwt.verify.issuer=${JWT_ISSUER:https://auth.tradeflow.io}
quarkus.http.auth.proactive=false
{%- endif %}

# ── OpenTelemetry ───────────────────────────────────────────────────────────
quarkus.otel.resource.attributes=service.name=${{ values.serviceName }}
quarkus.otel.exporter.otlp.traces.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces
quarkus.otel.exporter.otlp.traces.protocol=http/protobuf
quarkus.otel.traces.sampler=always_on
quarkus.otel.propagators=tracecontext,baggage
quarkus.otel.enabled=true

# ── Health + Metrics ────────────────────────────────────────────────────────
quarkus.smallrye-health.root-path=/q/health
quarkus.micrometer.export.prometheus.enabled=true
quarkus.smallrye-openapi.path=/q/openapi
quarkus.swagger-ui.always-include=true

# ── Logging ─────────────────────────────────────────────────────────────────
quarkus.log.level=INFO
quarkus.log.category."io.tradeflow".level=INFO
quarkus.log.console.format=%d{HH:mm:ss.SSS} %-5p [%c{3.}] (%t) [%X{traceId},%X{spanId}] %s%e%n

# ── Dev Profile ─────────────────────────────────────────────────────────────
%dev.quarkus.otel.enabled=false
%dev.quarkus.oidc.enabled=false